<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=360">
<title>JARVIS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 340px;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 13px;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    border-bottom: 1px solid #21262d;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-title {
    font-size: 16px;
    font-weight: 700;
    color: #58a6ff;
    letter-spacing: 2px;
  }
  .arc-reactor {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #58a6ff;
    box-shadow: 0 0 6px #58a6ff, 0 0 12px rgba(88, 166, 255, 0.4);
    animation: pulse 1.618s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px #58a6ff; }
    50% { opacity: 0.6; box-shadow: 0 0 12px #58a6ff, 0 0 20px rgba(88, 166, 255, 0.3); }
  }
  .version {
    font-size: 10px;
    color: #8b949e;
    background: #161b22;
    padding: 2px 6px;
    border-radius: 8px;
    border: 1px solid #21262d;
  }

  /* ── Status ─────────────────────────────────────── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    font-size: 11px;
    color: #8b949e;
    border-bottom: 1px solid #21262d;
  }
  .status-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #3fb950;
  }
  .status-val {
    color: #d4af37;
    font-weight: 600;
  }

  /* ── Command Input ──────────────────────────────── */
  .command-section {
    padding: 12px 16px;
    border-bottom: 1px solid #21262d;
  }
  .command-row {
    display: flex;
    gap: 6px;
  }
  .command-input {
    flex: 1;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 10px;
    color: #c9d1d9;
    font-size: 12px;
    font-family: 'Consolas', 'Monaco', monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  .command-input:focus {
    border-color: #58a6ff;
  }
  .command-input::placeholder {
    color: #484f58;
  }
  .submit-btn {
    background: #58a6ff;
    border: none;
    border-radius: 6px;
    color: #0d1117;
    font-weight: 700;
    font-size: 12px;
    padding: 8px 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .submit-btn:hover {
    background: #79c0ff;
  }
  .submit-btn:active {
    background: #388bfd;
  }

  /* ── Quick Actions ──────────────────────────────── */
  .actions-label {
    padding: 8px 16px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #484f58;
  }
  .actions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    padding: 4px 16px 12px;
  }
  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 10px 4px;
    color: #c9d1d9;
    font-size: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .action-btn:hover {
    border-color: #58a6ff;
    background: #1a2332;
  }
  .action-btn:active {
    background: #0d2240;
  }
  .action-icon {
    font-size: 18px;
    line-height: 1;
  }
  .action-text {
    white-space: nowrap;
  }

  /* ── Footer ─────────────────────────────────────── */
  .footer {
    padding: 8px 16px 12px;
    border-top: 1px solid #21262d;
  }
  .panel-btn {
    width: 100%;
    background: linear-gradient(135deg, #1a1f2e, #161b22);
    border: 1px solid #d4af37;
    border-radius: 8px;
    color: #d4af37;
    font-size: 12px;
    font-weight: 600;
    padding: 10px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .panel-btn:hover {
    background: linear-gradient(135deg, #2a2520, #1e1a14);
    box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
  }
  .panel-btn:active {
    background: #1a1510;
  }

  /* ── Response ────────────────────────────────────── */
  .response-area {
    display: none;
    padding: 8px 16px;
    border-bottom: 1px solid #21262d;
  }
  .response-area.visible { display: block; }
  .response-text {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
    font-family: 'Consolas', monospace;
    color: #3fb950;
    max-height: 80px;
    overflow-y: auto;
    word-break: break-word;
  }
</style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-title">JARVIS</span>
      <span class="arc-reactor"></span>
    </div>
    <span class="version">v4.0.0</span>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-item">
      <span class="status-dot"></span>
      <span>Heartbeat:</span>
      <span class="status-val" id="heartbeatCount">0</span>
    </div>
    <div class="status-item">
      <span>Tasks:</span>
      <span class="status-val" id="taskCount">0</span>
    </div>
  </div>

  <!-- Command Input -->
  <div class="command-section">
    <div class="command-row">
      <input type="text" class="command-input" id="cmdInput"
             placeholder="Enter command..." autocomplete="off">
      <button class="submit-btn" id="submitBtn">▶</button>
    </div>
  </div>

  <!-- Response -->
  <div class="response-area" id="responseArea">
    <div class="response-text" id="responseText"></div>
  </div>

  <!-- Quick Actions -->
  <div class="actions-label">Quick Actions</div>
  <div class="actions-grid">
    <button class="action-btn" data-action="read-page">
      <span class="action-icon">📖</span>
      <span class="action-text">Read Page</span>
    </button>
    <button class="action-btn" data-action="analyze">
      <span class="action-icon">🔍</span>
      <span class="action-text">Analyze</span>
    </button>
    <button class="action-btn" data-action="summarize">
      <span class="action-icon">📊</span>
      <span class="action-text">Summarize</span>
    </button>
    <button class="action-btn" data-action="remember">
      <span class="action-icon">💾</span>
      <span class="action-text">Remember</span>
    </button>
    <button class="action-btn" data-action="memory">
      <span class="action-icon">🧠</span>
      <span class="action-text">Memory</span>
    </button>
    <button class="action-btn" data-action="quick-task">
      <span class="action-icon">⚡</span>
      <span class="action-text">Quick Task</span>
    </button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="panel-btn" id="openPanel">✦ Open Side Panel</button>
  </div>

<script>
(function() {
  var cmdInput = document.getElementById('cmdInput');
  var submitBtn = document.getElementById('submitBtn');
  var responseArea = document.getElementById('responseArea');
  var responseText = document.getElementById('responseText');
  var heartbeatEl = document.getElementById('heartbeatCount');
  var taskCountEl = document.getElementById('taskCount');
  var openPanelBtn = document.getElementById('openPanel');
  var actionBtns = document.querySelectorAll('.action-btn');
  var heartbeatCounter = 0;
  var heartbeatTimer = null;

  function startHeartbeat() {
    heartbeatTimer = setInterval(function() {
      heartbeatCounter++;
      heartbeatEl.textContent = heartbeatCounter;
    }, 873);
  }

  function showResponse(text) {
    responseText.textContent = text;
    responseArea.className = 'response-area visible';
  }

  function sendCommand(intent, payload) {
    chrome.runtime.sendMessage(
      { action: 'parseCommand', command: intent, payload: payload || {} },
      function(response) {
        if (chrome.runtime.lastError) {
          showResponse('Error: ' + chrome.runtime.lastError.message);
          return;
        }
        if (response) {
          showResponse(JSON.stringify(response, null, 2));
        } else {
          showResponse('Command sent: ' + intent);
        }
      }
    );
  }

  function fetchStatus() {
    chrome.runtime.sendMessage(
      { action: 'getStatus' },
      function(response) {
        if (chrome.runtime.lastError) return;
        if (response && response.success && response.data && response.data.taskStats) {
          taskCountEl.textContent = response.data.taskStats.queued || 0;
        }
      }
    );
  }

  submitBtn.addEventListener('click', function() {
    var cmd = cmdInput.value.trim();
    if (!cmd) return;
    sendCommand(cmd, { raw: cmd });
    cmdInput.value = '';
  });

  cmdInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      submitBtn.click();
    }
  });

  for (var i = 0; i < actionBtns.length; i++) {
    actionBtns[i].addEventListener('click', function() {
      var action = this.getAttribute('data-action');
      sendCommand(action, { source: 'popup-quick-action' });
    });
  }

  openPanelBtn.addEventListener('click', function() {
    chrome.tabs.query({ active: true, currentWindow: true }, function(tabs) {
      if (tabs && tabs[0] && chrome.sidePanel) {
        chrome.sidePanel.open({ windowId: tabs[0].windowId }, function() {});
      }
    });
  });

  startHeartbeat();
  fetchStatus();
})();
</script>

</body>
</html>
