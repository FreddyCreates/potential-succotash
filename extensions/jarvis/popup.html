<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS AI — Quick Access</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 360px;
    background: #0a0a1a;
    color: #e8e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    padding: 0;
  }

  .header {
    padding: 14px 16px;
    background: linear-gradient(135deg, #6c63ff, #3d37a5);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 212, 170, 0.6);
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #00d4aa;
    box-shadow: 0 0 5px #00d4aa;
  }
  .version {
    font-size: 10px;
    opacity: 0.6;
  }

  .body {
    padding: 14px 16px;
  }

  .open-panel-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: #6c63ff;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  .open-panel-btn:hover { background: #3d37a5; }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: #606080;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    margin-top: 14px;
  }

  .cmd-input-area {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .cmd-input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid #2a2a50;
    border-radius: 6px;
    background: #10102a;
    color: #e8e8f0;
    font-size: 12px;
    outline: none;
  }
  .cmd-input:focus { border-color: #6c63ff; }
  .cmd-input::placeholder { color: #606080; }
  .cmd-send {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #6c63ff;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .cmd-send:hover { background: #3d37a5; }

  .quick-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 14px;
  }
  .q-btn {
    padding: 8px 6px;
    border: 1px solid #2a2a50;
    border-radius: 6px;
    background: #161640;
    color: #e8e8f0;
    font-size: 11px;
    cursor: pointer;
    font-weight: 500;
    text-align: center;
    transition: all 0.2s;
  }
  .q-btn:hover { background: #6c63ff; border-color: #6c63ff; color: #fff; }

  .status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .stat-card {
    padding: 8px;
    background: #1a1a3e;
    border: 1px solid #2a2a50;
    border-radius: 6px;
    text-align: center;
  }
  .stat-label {
    font-size: 9px;
    color: #606080;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 3px;
  }
  .stat-value {
    font-size: 15px;
    font-weight: 700;
    color: #00d4aa;
  }

  .response-area {
    margin-top: 10px;
    padding: 10px;
    background: #10102a;
    border: 1px solid #2a2a50;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.5;
    max-height: 160px;
    overflow-y: auto;
    display: none;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .response-area.visible { display: block; }

  .canister-status {
    margin-top: 14px;
    padding: 8px 10px;
    background: #161640;
    border: 1px solid #2a2a50;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #9090b0;
  }
  .canister-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #00d4aa;
    box-shadow: 0 0 4px #00d4aa;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a50; border-radius: 2px; }
</style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span class="logo">⚡ JARVIS</span>
      <div class="status-dot"></div>
    </div>
    <span class="version">v1.0.0</span>
  </div>

  <div class="body">
    <button class="open-panel-btn" id="openPanelBtn">Open Side Panel ↗</button>

    <div class="section-label">Quick Command</div>
    <div class="cmd-input-area">
      <input type="text" class="cmd-input" id="cmdInput" placeholder="Ask JARVIS..." autocomplete="off">
      <button class="cmd-send" id="cmdSend">→</button>
    </div>

    <div class="section-label">Quick Actions</div>
    <div class="quick-grid">
      <button class="q-btn" data-cmd="list tabs">🗂️ List Tabs</button>
      <button class="q-btn" data-cmd="screenshot">📸 Screenshot</button>
      <button class="q-btn" data-cmd="take note">📝 Take Note</button>
      <button class="q-btn" data-cmd="summarize">📋 Summarize</button>
      <button class="q-btn" data-cmd="read page">📖 Read Page</button>
      <button class="q-btn" data-cmd="new tab">➕ New Tab</button>
    </div>

    <div class="section-label">Status</div>
    <div class="status-grid">
      <div class="stat-card">
        <div class="stat-label">Heartbeat</div>
        <div class="stat-value" id="statHeartbeat">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Uptime</div>
        <div class="stat-value" id="statUptime" style="font-size:11px;">0m 0s</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Commands</div>
        <div class="stat-value" id="statCommands">0</div>
      </div>
    </div>

    <div class="response-area" id="responseArea"></div>

    <div class="canister-status">
      <div class="canister-dot"></div>
      <span>CANISTRUM connected • 10 Alpha Script AIs online</span>
    </div>
  </div>

<script>
(function () {
  'use strict';

  var cmdInput = document.getElementById('cmdInput');
  var cmdSend = document.getElementById('cmdSend');
  var responseArea = document.getElementById('responseArea');
  var statHeartbeat = document.getElementById('statHeartbeat');
  var statUptime = document.getElementById('statUptime');
  var statCommands = document.getElementById('statCommands');

  /* Open side panel */
  document.getElementById('openPanelBtn').addEventListener('click', () => {
    chrome.runtime.sendMessage({ action: 'openSidePanel' });
  });

  /* Send command */
  function sendCommand() {
    var text = cmdInput.value.trim();
    if (!text) return;
    cmdInput.value = '';

    responseArea.textContent = 'Processing...';
    responseArea.classList.add('visible');

    chrome.runtime.sendMessage({ action: 'executeCommand', command: text }, (resp) => {
      if (chrome.runtime.lastError) {
        responseArea.textContent = 'Error: ' + chrome.runtime.lastError.message;
        return;
      }
      if (!resp) {
        responseArea.textContent = 'No response.';
        return;
      }
      var output = resp.message || JSON.stringify(resp, null, 2);
      if (resp.tabs) {
        output += '\n';
        resp.tabs.forEach((t, i) => {
          output += (t.active ? '▶ ' : '  ') + (i + 1) + '. ' + t.title + '\n';
        });
      }
      responseArea.textContent = output;
      updateStatus();
    });
  }

  cmdSend.addEventListener('click', sendCommand);
  cmdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); sendCommand(); }
  });

  /* Quick action buttons */
  document.querySelectorAll('.q-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      var cmd = btn.dataset.cmd;
      if (cmd === 'take note') {
        cmdInput.value = 'take note: ';
        cmdInput.focus();
      } else {
        cmdInput.value = cmd;
        sendCommand();
      }
    });
  });

  /* Status updates */
  function updateStatus() {
    chrome.runtime.sendMessage({ action: 'getStatus' }, (resp) => {
      if (chrome.runtime.lastError || !resp || !resp.success) return;
      statHeartbeat.textContent = resp.data.heartbeatCount;
      statUptime.textContent = resp.data.uptimeFormatted;
      statCommands.textContent = resp.data.commandCount;
    });
  }

  setInterval(updateStatus, 2000);
  updateStatus();
  cmdInput.focus();

})();
</script>
</body>
</html>
