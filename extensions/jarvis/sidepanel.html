<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>JARVIS — AI Workspace</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{background:#0a0a1a;color:#c8c8e0;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;display:flex;flex-direction:column}
  .header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #1e1e3a;background:#0e0e24;flex-shrink:0}
  .arc-reactor{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,#6cf 30%,#39f 60%,transparent 70%);box-shadow:0 0 8px #6cf,0 0 16px #39f44;animation:pulse 1.746s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 8px #6cf,0 0 16px #39f44}50%{box-shadow:0 0 14px #6cf,0 0 28px #39f88}}
  @keyframes think-pulse{0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}
  .header h1{font-size:15px;font-weight:600;color:#e0e0ff;flex:1;letter-spacing:1px}
  .status{display:flex;align-items:center;gap:5px;font-size:10px;color:#888}
  .status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 4px #22c55e80;transition:all .3s}
  .toolbar{display:flex;gap:6px;padding:6px 16px;border-bottom:1px solid #1e1e3a;background:#0c0c20;flex-shrink:0;align-items:center}
  .toolbar-btn{background:#12122a;color:#888;border:1px solid #2a2a4a;border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;transition:all .15s}
  .toolbar-btn:hover{border-color:#6c63ff;color:#6c63ff}
  .toolbar-spacer{flex:1}
  .session-info{font-size:10px;color:#555}
  .arch-bar{display:flex;gap:4px;padding:6px 16px;border-bottom:1px solid #1e1e3a;flex-shrink:0;flex-wrap:wrap}
  .arch-badge{font-size:9px;padding:3px 8px;background:#12122a;border:1px solid #2a2a4a;border-radius:4px;color:#8888cc;cursor:pointer;transition:all .15s}
  .arch-badge:hover,.arch-badge.active{border-color:#6c63ff;color:#6c63ff;background:#6c63ff11}
  .thinking-panel{display:none;padding:8px 16px;border-bottom:1px solid #1e1e3a;background:#0c0c1a;flex-shrink:0;font-size:11px;color:#8888cc;max-height:120px;overflow-y:auto;line-height:1.6}
  .thinking-step{padding:2px 0;display:flex;gap:6px;align-items:flex-start}
  .thinking-step .icon{color:#6c63ff;flex-shrink:0}
  .thinking-step .label{color:#aaa}
  .thinking-step .time{color:#555;font-size:9px;margin-left:auto;flex-shrink:0}
  .chat{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:88%;padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.6;word-wrap:break-word;position:relative}
  .msg.user{align-self:flex-end;background:#6c63ff;color:#fff;border-bottom-right-radius:4px}
  .msg.ai{align-self:flex-start;background:#1a1a36;color:#c8c8e0;border:1px solid #2a2a4a;border-bottom-left-radius:4px}
  .msg .ts{display:block;font-size:9px;color:#666;margin-top:4px;text-align:right}
  .msg.ai .ts{text-align:left}
  .msg pre{background:#0a0a1a;border:1px solid #2a2a4a;border-radius:4px;padding:6px 8px;margin-top:4px;font-family:'Courier New',monospace;font-size:11px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;color:#a0c0ff}
  .msg .meta{font-size:10px;color:#6c63ff88;margin-top:6px;padding-top:4px;border-top:1px solid #2a2a4a33}
  .typing{align-self:flex-start;padding:8px 14px;background:#1a1a36;border:1px solid #2a2a4a;border-radius:12px;border-bottom-left-radius:4px;display:none}
  .typing span{display:inline-block;width:6px;height:6px;background:#6c63ff;border-radius:50%;margin:0 2px;animation:bounce .6s infinite}
  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .input-bar{display:flex;gap:6px;padding:10px 16px;border-top:1px solid #1e1e3a;background:#0e0e24;flex-shrink:0}
  .msg-input{flex:1;background:#0a0a1a;border:1px solid #2a2a4a;color:#e0e0ff;padding:8px 12px;border-radius:8px;font-size:12px;outline:none;font-family:inherit}
  .msg-input:focus{border-color:#6c63ff}
  .msg-input::placeholder{color:#444}
  .send-btn{background:#6c63ff;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:600;cursor:pointer;font-size:12px;transition:background .15s}
  .send-btn:hover{background:#5a52e0}
  .footer{display:flex;justify-content:space-between;padding:6px 16px;font-size:10px;color:#555;border-top:1px solid #1e1e3a;background:#0a0a14;flex-shrink:0}
</style>
</head>
<body>
  <div class="header">
    <div class="arc-reactor"></div>
    <h1>JARVIS</h1>
    <div class="status"><span class="status-dot" id="statusDot"></span><span id="statusText">Online</span></div>
  </div>
  <div class="toolbar">
    <button class="toolbar-btn" id="clearBtn">&#128465; Clear</button>
    <button class="toolbar-btn" id="exportBtn">&#128228; Export</button>
    <button class="toolbar-btn" id="helpBtn">&#10067; Help</button>
    <button class="toolbar-btn" id="thinkToggle">&#129504; Thinking</button>
    <span class="toolbar-spacer"></span>
    <span class="session-info" id="sessionInfo">Messages: 0</span>
  </div>
  <div class="arch-bar">
    <span class="arch-badge" data-arch="reasoning">&#129504; Reasoning</span>
    <span class="arch-badge" data-arch="creation">&#127912; Creation</span>
    <span class="arch-badge" data-arch="perception">&#128202; Perception</span>
    <span class="arch-badge" data-arch="protection">&#128737; Protection</span>
    <span class="arch-badge" data-arch="command">&#127744; Command</span>
  </div>
  <div class="thinking-panel" id="thinkingPanel"></div>
  <div class="chat" id="chat"></div>
  <div class="typing" id="typing"><span></span><span></span><span></span></div>
  <div class="input-bar">
    <input class="msg-input" id="msgInput" placeholder="Ask Jarvis — I think before I answer&#8230;" />
    <button class="send-btn" id="sendBtn">Send</button>
  </div>
  <div class="footer">
    <span id="hbFooter">HB: 0 | Last: &#8212;</span>
    <span>Phantom AI v1.0.0</span>
  </div>
<script>
(function(){
  var chat=document.getElementById('chat');
  var msgInput=document.getElementById('msgInput');
  var sendBtn=document.getElementById('sendBtn');
  var statusDot=document.getElementById('statusDot');
  var statusText=document.getElementById('statusText');
  var hbFooter=document.getElementById('hbFooter');
  var typingEl=document.getElementById('typing');
  var sessionInfo=document.getElementById('sessionInfo');
  var thinkingPanel=document.getElementById('thinkingPanel');
  var heartbeats=0;
  var msgCount=0;
  var showThinking=false;
  var STORAGE_KEY='jarvis_workspace_history';

  function scrollBottom(){chat.scrollTop=chat.scrollHeight;}
  function formatTs(ts){if(!ts)return '';var d=new Date(ts);return d.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit'});}

  function addMsg(text,role,ts,meta){
    var div=document.createElement('div');
    div.className='msg '+role;
    if(role==='ai'&&text&&(text.charAt(0)==='{'||text.charAt(0)==='[')){
      try{var parsed=JSON.parse(text);var pre=document.createElement('pre');pre.textContent=JSON.stringify(parsed,null,2);div.appendChild(pre);}
      catch(e){div.textContent=text;}
    } else {div.textContent=text;}
    var tsEl=document.createElement('span');tsEl.className='ts';tsEl.textContent=formatTs(ts||Date.now());div.appendChild(tsEl);
    chat.appendChild(div);msgCount++;sessionInfo.textContent='Messages: '+msgCount;scrollBottom();
  }

  function displayThinking(steps){
    if(!showThinking||!steps||!steps.length)return;
    thinkingPanel.style.display='block';
    thinkingPanel.textContent='';
    for(var i=0;i<steps.length;i++){
      var s=steps[i];
      var row=document.createElement('div');row.className='thinking-step';
      var icon=document.createElement('span');icon.className='icon';icon.textContent='\u25B8';
      var label=document.createElement('span');label.className='label';label.textContent=s.pattern;
      var time=document.createElement('span');time.className='time';time.textContent=s.ms+'ms';
      row.appendChild(icon);row.appendChild(label);row.appendChild(time);
      thinkingPanel.appendChild(row);
    }
  }

  function showTypingIndicator(){
    typingEl.style.display='inline-flex';
    statusDot.style.background='#f59e0b';
    statusDot.style.boxShadow='0 0 4px #f59e0b80';
    statusDot.style.animation='think-pulse 0.8s ease-in-out infinite';
    scrollBottom();
  }

  function hideTypingIndicator(){
    typingEl.style.display='none';
    statusDot.style.background='#22c55e';
    statusDot.style.boxShadow='0 0 4px #22c55e80';
    statusDot.style.animation='none';
  }

  function sendMessage(text){
    if(!text)return;
    addMsg(text,'user');
    showTypingIndicator();
    try{
      chrome.runtime.sendMessage({type:'sidePanel',command:text},function(resp){
        hideTypingIndicator();
        if(chrome.runtime.lastError){addMsg('Error: '+chrome.runtime.lastError.message,'ai');return;}
        if(resp&&resp.thinking){displayThinking(resp.thinking);}
        if(resp&&resp.result){addMsg(resp.result,'ai');}
        else if(resp){addMsg(JSON.stringify(resp),'ai');}
        else{addMsg('Command sent \u2014 processing.','ai');}
      });
    }catch(e){hideTypingIndicator();addMsg('Error: '+e.message,'ai');}
  }

  sendBtn.addEventListener('click',function(){var v=msgInput.value.trim();if(v){sendMessage(v);msgInput.value='';}});
  msgInput.addEventListener('keydown',function(e){if(e.key==='Enter'){var v=msgInput.value.trim();if(v){sendMessage(v);msgInput.value='';}}});

  /* Architecture badges — click to ask about that architecture */
  document.querySelectorAll('.arch-badge').forEach(function(badge){
    badge.addEventListener('click',function(){
      sendMessage('architectures');
      badge.classList.add('active');
      setTimeout(function(){badge.classList.remove('active');},1000);
    });
  });

  /* Thinking toggle */
  document.getElementById('thinkToggle').addEventListener('click',function(){
    showThinking=!showThinking;
    this.style.color=showThinking?'#6c63ff':'#888';
    this.style.borderColor=showThinking?'#6c63ff':'#2a2a4a';
    if(!showThinking)thinkingPanel.style.display='none';
  });

  /* Toolbar */
  document.getElementById('clearBtn').addEventListener('click',function(){
    if(confirm('Clear all conversation history?')){
      chat.textContent='';msgCount=0;sessionInfo.textContent='Messages: 0';
      thinkingPanel.style.display='none';thinkingPanel.textContent='';
      var update={};update[STORAGE_KEY]=[];chrome.storage.local.set(update);
      addMsg('\u{1F9E0} JARVIS workspace cleared. Phantom AI standing by.\nType "help" to see capabilities.','ai');
    }
  });

  document.getElementById('exportBtn').addEventListener('click',function(){
    chrome.storage.local.get(STORAGE_KEY,function(data){
      var history=(data&&data[STORAGE_KEY])||[];
      var text=history.map(function(m){return(m.role==='user'?'You':'JARVIS')+' ['+new Date(m.ts).toLocaleString()+']: '+m.content;}).join('\n\n');
      var blob=new Blob([text],{type:'text/plain'});var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download='jarvis-workspace-export.txt';
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    });
  });

  document.getElementById('helpBtn').addEventListener('click',function(){sendMessage('help');});

  /* Load history */
  chrome.storage.local.get(STORAGE_KEY,function(data){
    var history=(data&&data[STORAGE_KEY])||[];
    if(history.length>0){history.forEach(function(m){addMsg(m.content,m.role,m.ts);});}
    else{addMsg('\u{1F9E0} JARVIS AI online. Phantom AI thinking engine active.\n\nI think before I answer. Every response passes through 7 thinking patterns\nand 5 thinking architectures before I speak.\n\nType "help" to see what I can do, or just ask me anything.','ai');}
  });

  /* Heartbeat */
  function heartbeat(){
    try{
      chrome.runtime.sendMessage({type:'heartbeat'},function(resp){
        if(chrome.runtime.lastError)return setOffline();
        heartbeats++;var now=new Date().toLocaleTimeString('en-US',{hour12:false});
        hbFooter.textContent='HB: '+heartbeats+' | Last: '+now;
        statusDot.style.background='#22c55e';statusDot.style.boxShadow='0 0 4px #22c55e80';
        statusText.textContent='Online';
      });
    }catch(e){setOffline();}
  }
  function setOffline(){statusDot.style.background='#f87171';statusDot.style.boxShadow='0 0 4px #f8717180';statusText.textContent='Offline';}
  heartbeat();setInterval(heartbeat,5000);
})();
</script>
</body>
</html>
