<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Intelligence — Full Report</title>
<style>
/* ── Reset & Base ────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1b26;--bg2:#24283b;--bg3:#292e42;--fg:#a9b1d6;--fg2:#c0caf5;--dim:#565f89;--accent:#7aa2f7;--accent2:#89b4fa;--green:#9ece6a;--red:#f7768e;--yellow:#e0af68;--orange:#ff9e64;--purple:#bb9af7;--cyan:#7dcfff;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,.3)}
html{font-size:13px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--fg);line-height:1.5;min-width:320px;padding:0}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* ── Header ──────────────────────────────────────────────────────── */
.header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--bg3);position:sticky;top:0;background:var(--bg);z-index:100}
.logo{width:30px;height:30px;background:var(--accent);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:800;font-size:14px;flex-shrink:0}
.header h1{font-size:15px;color:var(--fg2);font-weight:600;flex:1}
.header-actions{display:flex;gap:6px}
.icon-btn{background:var(--bg2);border:1px solid var(--bg3);color:var(--fg);width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .15s}
.icon-btn:hover{background:var(--bg3)}

/* ── Toolbar ─────────────────────────────────────────────────────── */
.toolbar{padding:12px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--bg3)}
.btn{padding:8px 16px;background:var(--accent);color:var(--bg);border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:background .15s}
.btn:hover{background:var(--accent2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-outline:hover{background:rgba(122,162,247,.08)}
.meta-info{font-size:11px;color:var(--dim);flex:1;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Tabs ────────────────────────────────────────────────────────── */
.tabs{display:flex;border-bottom:1px solid var(--bg3);overflow-x:auto;position:sticky;top:58px;background:var(--bg);z-index:90;padding:0 8px}
.tab{padding:10px 14px;cursor:pointer;font-size:12px;color:var(--dim);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border .15s;user-select:none}
.tab:hover{color:var(--fg)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{background:var(--bg3);color:var(--fg);font-size:10px;padding:1px 5px;border-radius:10px;margin-left:4px}

/* ── Panel Content ───────────────────────────────────────────────── */
.panel{display:none;padding:16px}
.panel.active{display:block}
.section-title{font-size:13px;font-weight:600;color:var(--fg2);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.section-title:first-child{margin-top:0}

/* ── Cards ────────────────────────────────────────────────────────── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:12px;transition:border-color .15s}
.card:hover{border-color:var(--accent)}
.card .label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-bottom:2px}
.card .value{font-size:20px;font-weight:700;color:var(--fg2)}
.card .value.accent{color:var(--accent)}
.card .value.green{color:var(--green)}
.card .value.red{color:var(--red)}
.card .sub{font-size:10px;color:var(--dim);margin-top:2px}

/* ── Bar Chart ────────────────────────────────────────────────────── */
.bar-chart{margin:8px 0 16px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bar-label{width:90px;text-align:right;font-size:11px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:18px;background:var(--bg3);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease;min-width:2px}
.bar-count{font-size:10px;color:var(--dim);width:30px}

/* ── Tables ──────────────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;margin:8px 0 16px;border:1px solid var(--bg3);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg2);color:var(--dim);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px;padding:8px 10px;text-align:left;position:sticky;top:0}
td{padding:7px 10px;border-top:1px solid var(--bg3);color:var(--fg);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:rgba(122,162,247,.04)}

/* ── Heading Tree ────────────────────────────────────────────────── */
.heading-tree{margin:8px 0 16px}
.heading-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--bg3)}
.heading-tag{font-size:10px;font-weight:700;color:var(--bg);padding:2px 6px;border-radius:4px;min-width:28px;text-align:center}
.h1-tag{background:var(--accent)}.h2-tag{background:var(--purple)}.h3-tag{background:var(--green)}.h4-tag{background:var(--yellow)}.h5-tag{background:var(--orange)}.h6-tag{background:var(--cyan)}
.heading-text{font-size:12px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Image Grid ──────────────────────────────────────────────────── */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:8px 0 16px}
.img-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:8px;font-size:11px}
.img-card .img-preview{width:100%;height:80px;background:var(--bg3);border-radius:4px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.img-card .img-preview img{max-width:100%;max-height:100%;object-fit:contain}
.img-card .img-alt{color:var(--fg);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.img-card .img-meta{color:var(--dim);font-size:10px}
.img-card .no-alt{color:var(--red);font-weight:600}

/* ── SEO ──────────────────────────────────────────────────────────── */
.seo-item{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.seo-item .seo-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-bottom:2px}
.seo-item .seo-value{font-size:12px;color:var(--fg2);word-break:break-all}
.seo-item .seo-length{font-size:10px;color:var(--dim);margin-top:2px}
.seo-score{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.score-good{background:rgba(158,206,106,.15);color:var(--green)}
.score-warn{background:rgba(224,175,104,.15);color:var(--yellow)}
.score-bad{background:rgba(247,118,142,.15);color:var(--red)}

/* ── Issues ───────────────────────────────────────────────────────── */
.issue{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;margin-bottom:6px;background:var(--bg2);border-radius:6px;border-left:3px solid var(--dim)}
.issue.error{border-left-color:var(--red)}
.issue.warning{border-left-color:var(--yellow)}
.issue.info{border-left-color:var(--accent)}
.issue .severity{font-size:10px;font-weight:700;text-transform:uppercase;padding:1px 6px;border-radius:4px;flex-shrink:0}
.issue .severity.error{background:rgba(247,118,142,.15);color:var(--red)}
.issue .severity.warning{background:rgba(224,175,104,.15);color:var(--yellow)}
.issue .severity.info{background:rgba(122,162,247,.15);color:var(--accent)}
.issue .message{font-size:12px;color:var(--fg)}

/* ── Filters ──────────────────────────────────────────────────────── */
.filters{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
.filter-btn{padding:4px 10px;font-size:11px;background:var(--bg2);color:var(--dim);border:1px solid var(--bg3);border-radius:14px;cursor:pointer;transition:all .15s}
.filter-btn:hover,.filter-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(122,162,247,.08)}

/* ── History ──────────────────────────────────────────────────────── */
.history-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border-radius:6px;margin-bottom:6px;cursor:pointer;border:1px solid var(--bg3);transition:border-color .15s}
.history-item:hover{border-color:var(--accent)}
.history-url{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--fg)}
.history-time{font-size:10px;color:var(--dim);white-space:nowrap}

/* ── Utilities ────────────────────────────────────────────────────── */
.hidden{display:none!important}
.empty-state{text-align:center;padding:40px 20px;color:var(--dim)}
.empty-state .icon{font-size:36px;margin-bottom:10px}
.empty-state p{font-size:13px}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin:2px}
.tag-ext{background:rgba(187,154,247,.15);color:var(--purple)}
.tag-int{background:rgba(158,206,106,.15);color:var(--green)}
.tag-sus{background:rgba(247,118,142,.15);color:var(--red)}
.tag-new{background:rgba(125,207,255,.15);color:var(--cyan)}
.perf-metric{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg3);font-size:12px}
.perf-metric .perf-label{color:var(--dim)}
.perf-metric .perf-value{color:var(--fg2);font-weight:600}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--fg2);padding:8px 18px;border-radius:8px;font-size:12px;box-shadow:var(--shadow);z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">PI</div>
  <h1>Page Intelligence</h1>
  <div class="header-actions">
    <button class="icon-btn" id="exportBtn" title="Export JSON">📥</button>
    <button class="icon-btn" id="copyBtn" title="Copy Summary">📋</button>
    <button class="icon-btn" id="historyToggle" title="History">🕑</button>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <button class="btn" id="analyzeBtn">⚡ Analyze Page</button>
  <div class="meta-info" id="metaInfo">Click Analyze to start</div>
</div>

<!-- Tabs -->
<div class="tabs" id="tabBar">
  <div class="tab active" data-tab="overview">Overview</div>
  <div class="tab" data-tab="text">Text</div>
  <div class="tab" data-tab="structure">Structure</div>
  <div class="tab" data-tab="links">Links</div>
  <div class="tab" data-tab="images">Images</div>
  <div class="tab" data-tab="seo">SEO</div>
  <div class="tab" data-tab="a11y">Accessibility</div>
</div>

<!-- Empty State -->
<div id="emptyState" class="empty-state">
  <div class="icon">🔍</div>
  <p>Analyze a page to see detailed insights</p>
</div>

<!-- History Drawer -->
<div id="historyPanel" class="panel" style="display:none">
  <div class="section-title">📜 Analysis History</div>
  <div id="historyList"></div>
</div>

<!-- ═══════════════════ OVERVIEW TAB ═══════════════════ -->
<div class="panel active" data-panel="overview" id="panelOverview">
  <div class="card-grid" id="overviewCards"></div>
  <div id="overviewIssues"></div>
</div>

<!-- ═══════════════════ TEXT TAB ═══════════════════════ -->
<div class="panel" data-panel="text" id="panelText">
  <div class="card-grid" id="textCards"></div>
  <div class="section-title">📊 Top Words</div>
  <div class="bar-chart" id="topWordsChart"></div>
</div>

<!-- ═══════════════════ STRUCTURE TAB ═════════════════ -->
<div class="panel" data-panel="structure" id="panelStructure">
  <div class="card-grid" id="structureCards"></div>
  <div id="structureIssues"></div>
  <div class="section-title">🏗️ Heading Tree</div>
  <div class="heading-tree" id="headingTree"></div>
</div>

<!-- ═══════════════════ LINKS TAB ═════════════════════ -->
<div class="panel" data-panel="links" id="panelLinks">
  <div class="card-grid" id="linkCards"></div>
  <div class="filters" id="linkFilters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="external">External</button>
    <button class="filter-btn" data-filter="internal">Internal</button>
    <button class="filter-btn" data-filter="suspicious">Suspicious</button>
  </div>
  <div class="table-wrap"><table id="linkTable"><thead><tr><th>Text</th><th>URL</th><th>Type</th></tr></thead><tbody></tbody></table></div>
</div>

<!-- ═══════════════════ IMAGES TAB ════════════════════ -->
<div class="panel" data-panel="images" id="panelImages">
  <div class="card-grid" id="imageCards"></div>
  <div class="img-grid" id="imageGrid"></div>
</div>

<!-- ═══════════════════ SEO TAB ═══════════════════════ -->
<div class="panel" data-panel="seo" id="panelSeo">
  <div class="section-title">📝 Meta Tags</div>
  <div id="seoMeta"></div>
  <div class="section-title">🔗 Open Graph</div>
  <div id="seoOg"></div>
  <div class="section-title">🐦 Twitter Card</div>
  <div id="seoTwitter"></div>
  <div class="section-title">⚠️ SEO Issues</div>
  <div id="seoIssues"></div>
</div>

<!-- ═══════════════════ ACCESSIBILITY TAB ═════════════ -->
<div class="panel" data-panel="a11y" id="panelA11y">
  <div class="card-grid" id="a11yCards"></div>
  <div class="section-title">🏷️ ARIA Landmarks</div>
  <div id="landmarkList"></div>
  <div class="section-title">⚠️ Issues</div>
  <div id="a11yIssues"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ── Utilities ────────────────────────────────────────────────────── */
function escapeHtml(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function fmt(n){return typeof n==="number"?n.toLocaleString():n||"—"}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200)}

let currentData = null;
let historyOpen = false;

/* ── Tab Switching ────────────────────────────────────────────────── */
document.getElementById("tabBar").addEventListener("click", e => {
  const tab = e.target.closest(".tab");
  if (!tab) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  const name = tab.dataset.tab;
  document.querySelectorAll("[data-panel]").forEach(p => p.classList.remove("active"));
  const panel = document.querySelector(`[data-panel="${name}"]`);
  if (panel) panel.classList.add("active");
  if (historyOpen) { historyOpen = false; document.getElementById("historyPanel").style.display = "none"; }
});

/* ── Analyze ──────────────────────────────────────────────────────── */
document.getElementById("analyzeBtn").addEventListener("click", () => {
  const btn = document.getElementById("analyzeBtn");
  btn.disabled = true;
  btn.textContent = "Analyzing…";
  document.getElementById("metaInfo").textContent = "Scanning page…";

  chrome.runtime.sendMessage({ action: "analyzePage" }, response => {
    btn.disabled = false;
    btn.textContent = "⚡ Analyze Page";
    if (!response || response.error) {
      document.getElementById("metaInfo").textContent = response ? response.error : "Analysis failed.";
      return;
    }
    currentData = response;
    document.getElementById("emptyState").classList.add("hidden");
    const ts = new Date(response.timestamp);
    document.getElementById("metaInfo").textContent = escapeHtml(response.url).substring(0, 60) + " · " + ts.toLocaleTimeString();
    renderAll(response);
    saveHistory(response);
  });
});

/* ── Render All Panels ────────────────────────────────────────────── */
function renderAll(d) {
  renderOverview(d);
  renderText(d.text);
  renderStructure(d.headings);
  renderLinks(d.links);
  renderImages(d.images);
  renderSeo(d.seo);
  renderA11y(d.accessibility);
}

/* ── Overview ─────────────────────────────────────────────────────── */
function renderOverview(d) {
  const cards = [
    { label: "Words", value: fmt(d.text.wordCount) },
    { label: "Reading Time", value: d.text.readingTime, cls: "accent" },
    { label: "Headings", value: fmt(d.headings.count) },
    { label: "Links", value: fmt(d.links.total) },
    { label: "Images", value: fmt(d.images.total) },
    { label: "DOM Nodes", value: fmt(d.performance.domNodeCount) },
    { label: "Scripts", value: fmt(d.performance.scripts) },
    { label: "Stylesheets", value: fmt(d.performance.stylesheets) },
  ];
  document.getElementById("overviewCards").innerHTML = cards.map(c =>
    `<div class="card"><div class="label">${escapeHtml(c.label)}</div><div class="value ${c.cls||""}">${escapeHtml(String(c.value))}</div></div>`
  ).join("");

  // Collect all issues
  const allIssues = [];
  if (d.headings.issues) d.headings.issues.forEach(i => allIssues.push({ severity: "warning", message: i }));
  if (d.seo.issues) d.seo.issues.forEach(i => allIssues.push({ severity: "warning", message: i }));
  if (d.accessibility.issues) d.accessibility.issues.forEach(i => allIssues.push(i));
  if (d.performance.warnings) d.performance.warnings.forEach(i => allIssues.push({ severity: "warning", message: i }));
  if (d.images.missingAlt > 0) allIssues.push({ severity: "error", message: `${d.images.missingAlt} image(s) missing alt text` });
  if (d.links.emptyText > 0) allIssues.push({ severity: "warning", message: `${d.links.emptyText} link(s) with empty text` });
  if (d.links.suspicious > 0) allIssues.push({ severity: "warning", message: `${d.links.suspicious} suspicious link(s)` });

  const issueHtml = allIssues.length
    ? `<div class="section-title">⚠️ Issues Found (${allIssues.length})</div>` + allIssues.map(i =>
        `<div class="issue ${escapeHtml(i.severity)}"><span class="severity ${escapeHtml(i.severity)}">${escapeHtml(i.severity)}</span><span class="message">${escapeHtml(i.message)}</span></div>`
      ).join("")
    : `<div class="section-title" style="color:var(--green)">✅ No major issues found</div>`;
  document.getElementById("overviewIssues").innerHTML = issueHtml;
}

/* ── Text ─────────────────────────────────────────────────────────── */
function renderText(t) {
  const cards = [
    { label: "Words", value: fmt(t.wordCount) },
    { label: "Characters", value: fmt(t.charCount) },
    { label: "Sentences", value: fmt(t.sentenceCount) },
    { label: "Paragraphs", value: fmt(t.paragraphCount) },
    { label: "Reading Time", value: t.readingTime, cls: "accent" },
  ];
  document.getElementById("textCards").innerHTML = cards.map(c =>
    `<div class="card"><div class="label">${escapeHtml(c.label)}</div><div class="value ${c.cls||""}">${escapeHtml(String(c.value))}</div></div>`
  ).join("");

  const max = t.topWords.length ? t.topWords[0].count : 1;
  document.getElementById("topWordsChart").innerHTML = t.topWords.map(w =>
    `<div class="bar-row"><div class="bar-label">${escapeHtml(w.word)}</div><div class="bar-track"><div class="bar-fill" style="width:${(w.count/max*100).toFixed(1)}%"></div></div><div class="bar-count">${w.count}</div></div>`
  ).join("") || '<div style="color:var(--dim);padding:8px">No significant words found</div>';
}

/* ── Structure ────────────────────────────────────────────────────── */
function renderStructure(h) {
  const cards = [{ label: "Total Headings", value: fmt(h.count) }];
  for (let l = 1; l <= 6; l++) {
    const n = h.headings.filter(x => x.level === l).length;
    if (n > 0) cards.push({ label: `H${l}`, value: fmt(n) });
  }
  document.getElementById("structureCards").innerHTML = cards.map(c =>
    `<div class="card"><div class="label">${escapeHtml(c.label)}</div><div class="value">${escapeHtml(String(c.value))}</div></div>`
  ).join("");

  document.getElementById("structureIssues").innerHTML = h.issues.length
    ? h.issues.map(i => `<div class="issue warning"><span class="severity warning">warn</span><span class="message">${escapeHtml(i)}</span></div>`).join("")
    : '';

  document.getElementById("headingTree").innerHTML = h.headings.map(x => {
    const indent = (x.level - 1) * 16;
    return `<div class="heading-item" style="padding-left:${indent}px"><span class="heading-tag h${x.level}-tag">${escapeHtml(x.tag)}</span><span class="heading-text">${escapeHtml(x.text)}</span></div>`;
  }).join("") || '<div style="color:var(--dim);padding:8px">No headings found</div>';
}

/* ── Links ────────────────────────────────────────────────────────── */
let linksData = [];
function renderLinks(l) {
  linksData = l.links;
  const cards = [
    { label: "Total", value: fmt(l.total) },
    { label: "Internal", value: fmt(l.internal), cls: "green" },
    { label: "External", value: fmt(l.external), cls: "accent" },
    { label: "Empty Text", value: fmt(l.emptyText), cls: l.emptyText > 0 ? "red" : "" },
    { label: "New Tab", value: fmt(l.newTab) },
    { label: "Suspicious", value: fmt(l.suspicious), cls: l.suspicious > 0 ? "red" : "" },
  ];
  document.getElementById("linkCards").innerHTML = cards.map(c =>
    `<div class="card"><div class="label">${escapeHtml(c.label)}</div><div class="value ${c.cls||""}">${escapeHtml(String(c.value))}</div></div>`
  ).join("");
  filterLinks("all");
}

function filterLinks(filter) {
  let filtered = linksData;
  if (filter === "external") filtered = linksData.filter(l => l.isExternal);
  else if (filter === "internal") filtered = linksData.filter(l => !l.isExternal);
  else if (filter === "suspicious") filtered = linksData.filter(l => l.type === "suspicious");

  const tbody = document.querySelector("#linkTable tbody");
  tbody.innerHTML = filtered.slice(0, 200).map(l => {
    const typeTag = l.isExternal ? '<span class="tag tag-ext">ext</span>' : '<span class="tag tag-int">int</span>';
    const extra = l.type === "suspicious" ? '<span class="tag tag-sus">⚠</span>' : '';
    const ntab = l.newTab ? '<span class="tag tag-new">↗</span>' : '';
    return `<tr><td>${escapeHtml(l.text)}</td><td title="${escapeHtml(l.href)}">${escapeHtml(l.href.substring(0,60))}</td><td>${typeTag}${extra}${ntab}</td></tr>`;
  }).join("") || '<tr><td colspan="3" style="text-align:center;color:var(--dim)">No links found</td></tr>';
}

document.getElementById("linkFilters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll("#linkFilters .filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  filterLinks(btn.dataset.filter);
});

/* ── Images ───────────────────────────────────────────────────────── */
function renderImages(img) {
  const cards = [
    { label: "Total", value: fmt(img.total) },
    { label: "Missing Alt", value: fmt(img.missingAlt), cls: img.missingAlt > 0 ? "red" : "green" },
    { label: "Empty Alt", value: fmt(img.emptyAlt), cls: img.emptyAlt > 0 ? "yellow" : "" },
    { label: "Lazy Loaded", value: fmt(img.lazyLoaded) },
  ];
  document.getElementById("imageCards").innerHTML = cards.map(c =>
    `<div class="card"><div class="label">${escapeHtml(c.label)}</div><div class="value ${c.cls||""}">${escapeHtml(String(c.value))}</div></div>`
  ).join("");

  document.getElementById("imageGrid").innerHTML = img.images.slice(0, 50).map(i => {
    const altDisplay = i.hasAlt
      ? (i.isEmptyAlt ? '<span class="no-alt">alt=""</span>' : `<div class="img-alt" title="${escapeHtml(i.alt)}">${escapeHtml(i.alt)}</div>`)
      : '<span class="no-alt">No alt ✗</span>';
    const dims = i.width && i.height ? `${i.width}×${i.height}` : "unknown";
    const imgTag = i.src ? `<img src="${escapeHtml(i.src)}" alt="" loading="lazy">` : '<span style="color:var(--dim)">No src</span>';
    return `<div class="img-card"><div class="img-preview">${imgTag}</div>${altDisplay}<div class="img-meta">${escapeHtml(dims)}${i.isLazy ? ' · lazy' : ''}</div></div>`;
  }).join("") || '<div style="color:var(--dim);padding:16px;text-align:center">No images found</div>';
}

/* ── SEO ──────────────────────────────────────────────────────────── */
function renderSeo(s) {
  function seoItem(label, value, length, goodRange, warnRange) {
    let score = "";
    if (length !== null && goodRange) {
      if (length >= goodRange[0] && length <= goodRange[1]) score = '<span class="seo-score score-good">Good</span>';
      else if (warnRange && length >= warnRange[0] && length <= warnRange[1]) score = '<span class="seo-score score-warn">Warn</span>';
      else score = '<span class="seo-score score-bad">Bad</span>';
    }
    return `<div class="seo-item"><div class="seo-label">${escapeHtml(label)} ${score}</div><div class="seo-value">${value !== null ? escapeHtml(String(value)) : '<span style="color:var(--dim)">Not set</span>'}</div>${length !== null ? `<div class="seo-length">${length} characters</div>` : ''}</div>`;
  }

  document.getElementById("seoMeta").innerHTML = [
    seoItem("Title", s.title, s.titleLength, [10, 60], [5, 70]),
    seoItem("Description", s.description, s.descriptionLength, [50, 160], [30, 200]),
    seoItem("Canonical", s.canonical, null),
    seoItem("Robots", s.robots, null),
    seoItem("Charset", s.charset, null),
    seoItem("Viewport", s.viewport, null),
    seoItem("Language", s.lang, null),
  ].join("");

  document.getElementById("seoOg").innerHTML = Object.keys(s.ogTags).length
    ? Object.entries(s.ogTags).map(([k, v]) => seoItem(k, v, null)).join("")
    : '<div style="color:var(--dim);padding:8px">No Open Graph tags found</div>';

  document.getElementById("seoTwitter").innerHTML = Object.keys(s.twitterTags).length
    ? Object.entries(s.twitterTags).map(([k, v]) => seoItem(k, v, null)).join("")
    : '<div style="color:var(--dim);padding:8px">No Twitter Card tags found</div>';

  document.getElementById("seoIssues").innerHTML = s.issues.length
    ? s.issues.map(i => `<div class="issue warning"><span class="severity warning">warn</span><span class="message">${escapeHtml(i)}</span></div>`).join("")
    : '<div style="color:var(--green);padding:8px">✅ All SEO checks passed</div>';
}

/* ── Accessibility ────────────────────────────────────────────────── */
function renderA11y(a) {
  const cards = [
    { label: "Unlabeled Inputs", value: fmt(a.unlabeledInputs), cls: a.unlabeledInputs > 0 ? "red" : "green" },
    { label: "Unnamed Buttons", value: fmt(a.unnamedButtons), cls: a.unnamedButtons > 0 ? "red" : "green" },
    { label: "Landmarks", value: fmt(a.landmarks.length) },
    { label: "Issues", value: fmt(a.issues.length), cls: a.issues.length > 0 ? "yellow" : "green" },
  ];
  document.getElementById("a11yCards").innerHTML = cards.map(c =>
    `<div class="card"><div class="label">${escapeHtml(c.label)}</div><div class="value ${c.cls||""}">${escapeHtml(String(c.value))}</div></div>`
  ).join("");

  document.getElementById("landmarkList").innerHTML = a.landmarks.length
    ? a.landmarks.map(l => `<div class="perf-metric"><span class="perf-label">${escapeHtml(l.role)}</span><span class="perf-value">${l.count}</span></div>`).join("")
    : '<div style="color:var(--dim);padding:8px">No ARIA landmarks detected</div>';

  document.getElementById("a11yIssues").innerHTML = a.issues.length
    ? a.issues.map(i => `<div class="issue ${escapeHtml(i.severity)}"><span class="severity ${escapeHtml(i.severity)}">${escapeHtml(i.severity)}</span><span class="message">${escapeHtml(i.message)}</span></div>`).join("")
    : '<div style="color:var(--green);padding:8px">✅ No accessibility issues found</div>';
}

/* ── Export JSON ──────────────────────────────────────────────────── */
document.getElementById("exportBtn").addEventListener("click", () => {
  if (!currentData) { showToast("Nothing to export yet"); return; }
  const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `page-intelligence-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("Exported as JSON");
});

/* ── Copy Summary ─────────────────────────────────────────────────── */
document.getElementById("copyBtn").addEventListener("click", () => {
  if (!currentData) { showToast("Nothing to copy yet"); return; }
  const d = currentData;
  const summary = [
    `Page Intelligence Report`,
    `URL: ${d.url}`,
    `Analyzed: ${d.timestamp}`,
    ``,
    `Text: ${d.text.wordCount} words, ${d.text.readingTime} reading time`,
    `Headings: ${d.headings.count} (${d.headings.issues.length} issues)`,
    `Links: ${d.links.total} (${d.links.internal} internal, ${d.links.external} external)`,
    `Images: ${d.images.total} (${d.images.missingAlt} missing alt)`,
    `DOM Nodes: ${d.performance.domNodeCount}`,
    `SEO Issues: ${d.seo.issues.length}`,
    `A11y Issues: ${d.accessibility.issues.length}`,
  ].join("\n");
  navigator.clipboard.writeText(summary).then(() => showToast("Summary copied!")).catch(() => showToast("Copy failed"));
});

/* ── History ──────────────────────────────────────────────────────── */
document.getElementById("historyToggle").addEventListener("click", () => {
  historyOpen = !historyOpen;
  const panel = document.getElementById("historyPanel");
  panel.style.display = historyOpen ? "block" : "none";
  if (historyOpen) {
    document.querySelectorAll("[data-panel]").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    loadHistory();
  } else {
    document.querySelector('.tab[data-tab="overview"]').classList.add("active");
    document.querySelector('[data-panel="overview"]').classList.add("active");
  }
});

function saveHistory(data) {
  chrome.storage.local.get({ piHistory: [] }, result => {
    const history = result.piHistory;
    history.unshift({ url: data.url, title: data.title, timestamp: data.timestamp, data });
    if (history.length > 10) history.length = 10;
    chrome.storage.local.set({ piHistory: history });
  });
}

function loadHistory() {
  chrome.storage.local.get({ piHistory: [] }, result => {
    const list = document.getElementById("historyList");
    if (result.piHistory.length === 0) {
      list.innerHTML = '<div style="color:var(--dim);padding:16px;text-align:center">No history yet</div>';
      return;
    }
    list.innerHTML = result.piHistory.map((h, i) => {
      const ts = new Date(h.timestamp).toLocaleString();
      return `<div class="history-item" data-idx="${i}"><span class="history-url" title="${escapeHtml(h.url)}">${escapeHtml(h.title || h.url)}</span><span class="history-time">${escapeHtml(ts)}</span></div>`;
    }).join("");
  });
}

document.getElementById("historyList").addEventListener("click", e => {
  const item = e.target.closest(".history-item");
  if (!item) return;
  const idx = parseInt(item.dataset.idx, 10);
  chrome.storage.local.get({ piHistory: [] }, result => {
    const entry = result.piHistory[idx];
    if (entry && entry.data) {
      currentData = entry.data;
      document.getElementById("emptyState").classList.add("hidden");
      const ts = new Date(entry.timestamp);
      document.getElementById("metaInfo").textContent = escapeHtml(entry.url).substring(0, 60) + " · " + ts.toLocaleTimeString();
      renderAll(entry.data);
      historyOpen = false;
      document.getElementById("historyPanel").style.display = "none";
      document.querySelector('.tab[data-tab="overview"]').classList.add("active");
      document.querySelector('[data-panel="overview"]').classList.add("active");
    }
  });
});
</script>
