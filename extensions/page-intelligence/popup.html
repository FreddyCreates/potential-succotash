<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Intelligence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1b26;
      color: #a9b1d6;
      padding: 16px;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      border-bottom: 1px solid #292e42;
      padding-bottom: 12px;
    }
    .header h1 {
      font-size: 16px;
      color: #c0caf5;
      font-weight: 600;
    }
    .logo {
      width: 28px;
      height: 28px;
      background: #7aa2f7;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1b26;
      font-weight: 700;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #7aa2f7;
      color: #1a1b26;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #89b4fa; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      color: #7aa2f7;
      border: 1px solid #7aa2f7;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: rgba(122,162,247,0.1); }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 14px 0;
    }
    .stat-card {
      background: #24283b;
      border-radius: 6px;
      padding: 10px;
    }
    .stat-card .label {
      font-size: 10px;
      text-transform: uppercase;
      color: #565f89;
      letter-spacing: 0.5px;
    }
    .stat-card .value {
      font-size: 18px;
      font-weight: 700;
      color: #c0caf5;
      margin-top: 2px;
    }
    .stat-card .value.accent { color: #7aa2f7; }
    #status {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: #565f89;
    }
    .error { color: #f7768e; }
    .url-bar {
      font-size: 11px;
      color: #565f89;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">PI</div>
    <h1>Page Intelligence</h1>
  </div>

  <div id="url-bar" class="url-bar hidden"></div>
  <button id="analyzeBtn" class="btn">⚡ Analyze This Page</button>

  <div id="results" class="hidden">
    <div class="stats">
      <div class="stat-card"><div class="label">Words</div><div class="value" id="s-words">—</div></div>
      <div class="stat-card"><div class="label">Reading Time</div><div class="value accent" id="s-time">—</div></div>
      <div class="stat-card"><div class="label">Headings</div><div class="value" id="s-headings">—</div></div>
      <div class="stat-card"><div class="label">Links</div><div class="value" id="s-links">—</div></div>
      <div class="stat-card"><div class="label">Images</div><div class="value" id="s-images">—</div></div>
      <div class="stat-card"><div class="label">DOM Nodes</div><div class="value" id="s-nodes">—</div></div>
    </div>
    <button id="openPanel" class="btn btn-secondary">📊 Open Full Report</button>
  </div>

  <div id="status"></div>

  <script>
    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    const analyzeBtn = document.getElementById("analyzeBtn");
    const status = document.getElementById("status");
    const results = document.getElementById("results");
    const urlBar = document.getElementById("url-bar");

    analyzeBtn.addEventListener("click", () => {
      analyzeBtn.disabled = true;
      status.textContent = "Analyzing…";
      status.className = "";
      results.classList.add("hidden");

      chrome.runtime.sendMessage({ action: "analyzePage" }, (response) => {
        analyzeBtn.disabled = false;
        if (!response || response.error) {
          status.textContent = response ? response.error : "No response from page.";
          status.className = "error";
          return;
        }

        urlBar.textContent = response.url;
        urlBar.classList.remove("hidden");

        document.getElementById("s-words").textContent = response.text.wordCount.toLocaleString();
        document.getElementById("s-time").textContent = response.text.readingTime;
        document.getElementById("s-headings").textContent = response.headings.count;
        document.getElementById("s-links").textContent = response.links.total;
        document.getElementById("s-images").textContent = response.images.total;
        document.getElementById("s-nodes").textContent = response.performance.domNodeCount.toLocaleString();

        results.classList.remove("hidden");
        status.textContent = "Analysis complete";
      });
    });

    document.getElementById("openPanel").addEventListener("click", () => {
      chrome.runtime.sendMessage({ action: "openSidePanel" });
    });
  </script>
</body>
</html>
