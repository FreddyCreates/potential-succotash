<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logic Prover — DevTools Panel</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;color:#c8c8e0;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;overflow-y:auto}
  .panel{display:grid;grid-template-rows:auto 1fr auto;height:100vh;padding:10px;gap:8px}
  .header{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#12122a;border:1px solid #2a2a4a;border-radius:6px}
  .status-dot{width:10px;height:10px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e80;flex-shrink:0}
  .header h1{font-size:15px;font-weight:600;color:#e0e0ff;flex:1}
  .header .hb-count{font-family:'Courier New',monospace;color:#6c63ff;font-size:13px}
  .body{display:grid;grid-template-columns:1fr 1fr;gap:8px;overflow:hidden}
  .card{background:#12122a;border:1px solid #2a2a4a;border-radius:6px;padding:10px;display:flex;flex-direction:column;overflow:hidden}
  .card h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#6c63ff;margin-bottom:8px}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .metric{background:#0e0e22;border-radius:4px;padding:8px;text-align:center}
  .metric .val{font-size:20px;font-weight:700;color:#6c63ff;font-family:'Courier New',monospace}
  .metric .lbl{font-size:10px;color:#888;margin-top:2px}
  .log-viewer{flex:1;overflow-y:auto;background:#08081a;border-radius:4px;padding:6px;font-family:'Courier New',monospace;font-size:11px;line-height:1.6}
  .log-viewer .log-entry{border-bottom:1px solid #1a1a30;padding:2px 0}
  .log-entry .ts{color:#555}.log-entry .msg{color:#a0a0d0}
  .log-entry.err .msg{color:#f87171}.log-entry.ok .msg{color:#22c55e}
  .timeline{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
  .tl-bar-wrap{display:flex;align-items:center;gap:6px;font-size:10px}
  .tl-bar{height:8px;background:#6c63ff;border-radius:2px;min-width:2px;transition:width .3s}
  .tl-time{color:#888;min-width:50px;text-align:right;font-family:'Courier New',monospace}
  .cmd-row{display:flex;gap:6px}
  .cmd-input{flex:1;background:#08081a;border:1px solid #2a2a4a;color:#e0e0ff;border-radius:4px;padding:6px 10px;font-family:'Courier New',monospace;font-size:12px;outline:none}
  .cmd-input:focus{border-color:#6c63ff}
  .cmd-input::placeholder{color:#444}
  .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  button{background:#6c63ff22;color:#6c63ff;border:1px solid #6c63ff44;border-radius:4px;padding:5px 12px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
  button:hover{background:#6c63ff44;border-color:#6c63ff}
  .footer{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#12122a;border:1px solid #2a2a4a;border-radius:6px;font-size:11px;color:#555}
  .footer kbd{background:#1a1a30;padding:1px 5px;border-radius:3px;font-family:'Courier New',monospace;color:#888;font-size:10px}
</style>
</head>
<body>
<div class="panel">
  <div class="header">
    <span class="status-dot" id="statusDot"></span>
    <h1>Logic Prover</h1>
    <span class="hb-count" id="hbDisplay">HB: 0</span>
  </div>
  <div class="body">
    <div class="card">
      <h2>Live Metrics</h2>
      <div class="metrics">
        <div class="metric"><div class="val" id="metricHB">0</div><div class="lbl">Heartbeats</div></div>
        <div class="metric"><div class="val" id="metricRT">—</div><div class="lbl">RTT (ms)</div></div>
        <div class="metric"><div class="val" id="metricMem">—</div><div class="lbl">Memory (MB)</div></div>
        <div class="metric"><div class="val" id="metricMsgs">0</div><div class="lbl">Messages</div></div>
      </div>
      <h2 style="margin-top:10px">Performance Timeline</h2>
      <div class="timeline" id="timeline"></div>
    </div>
    <div class="card">
      <h2>Console Log</h2>
      <div class="log-viewer" id="logViewer"></div>
      <h2 style="margin-top:10px">Command Palette</h2>
      <div class="cmd-row">
        <input class="cmd-input" id="cmdInput" placeholder="Enter command..." />
        <button id="cmdSend">Send</button>
      </div>
      <div class="actions">
        <button data-cmd="ping">Ping Engine</button>
        <button data-cmd="getState">Get State</button>
        <button data-cmd="heartbeat">Force Heartbeat</button>
        <button data-cmd="clearLogs">Clear Logs</button>
      </div>
    </div>
  </div>
  <div class="footer">
    <span>DevTools Inspector: <kbd>Ctrl+Shift+I</kbd> &rarr; Logic Prover tab</span>
    <span id="footerStatus">Connecting…</span>
  </div>
</div>
<script>
(function(){
  const logViewer=document.getElementById('logViewer');
  const timeline=document.getElementById('timeline');
  const cmdInput=document.getElementById('cmdInput');
  const metricHB=document.getElementById('metricHB');
  const metricRT=document.getElementById('metricRT');
  const metricMem=document.getElementById('metricMem');
  const metricMsgs=document.getElementById('metricMsgs');
  const hbDisplay=document.getElementById('hbDisplay');
  const statusDot=document.getElementById('statusDot');
  const footerStatus=document.getElementById('footerStatus');
  let heartbeats=0,msgCount=0,rttSamples=[];

  function ts(){return new Date().toLocaleTimeString('en-US',{hour12:false})}

  function addLog(msg,type){
    const el=document.createElement('div');
    el.className='log-entry'+(type?' '+type:'');
    var tsSpan=document.createElement('span');tsSpan.className='ts';tsSpan.textContent='['+ts()+']';var msgSpan=document.createElement('span');msgSpan.className='msg';msgSpan.textContent=msg;el.appendChild(tsSpan);el.appendChild(document.createTextNode(' '));el.appendChild(msgSpan);
    logViewer.appendChild(el);
    logViewer.scrollTop=logViewer.scrollHeight;
    if(logViewer.children.length>200)logViewer.removeChild(logViewer.firstChild);
  }

  function addTimelineBar(ms){
    const wrap=document.createElement('div');
    wrap.className='tl-bar-wrap';
    const bar=document.createElement('div');
    bar.className='tl-bar';
    bar.style.width=Math.min(Math.max(ms/2,2),200)+'px';
    if(ms>100)bar.style.background='#f59e0b';
    if(ms>300)bar.style.background='#f87171';
    const label=document.createElement('span');
    label.className='tl-time';
    label.textContent=ms.toFixed(1)+'ms';
    wrap.appendChild(bar);wrap.appendChild(label);
    timeline.appendChild(wrap);
    timeline.scrollTop=timeline.scrollHeight;
    if(timeline.children.length>50)timeline.removeChild(timeline.firstChild);
  }

  function sendCmd(cmd){
    const t0=performance.now();
    msgCount++;
    metricMsgs.textContent=msgCount;
    try{
      chrome.runtime.sendMessage({type:'devtools',command:cmd},function(resp){
        const rtt=performance.now()-t0;
        rttSamples.push(rtt);
        if(rttSamples.length>20)rttSamples.shift();
        const avg=rttSamples.reduce(function(a,b){return a+b},0)/rttSamples.length;
        metricRT.textContent=avg.toFixed(0);
        addTimelineBar(rtt);
        if(resp){addLog('← '+JSON.stringify(resp),'ok');}
        else{addLog('← (no response)','');}
      });
    }catch(e){addLog('Error: '+e.message,'err');}
    addLog('→ '+cmd,'');
  }

  function doHeartbeat(){
    const t0=performance.now();
    try{
      chrome.runtime.sendMessage({type:'heartbeat'},function(resp){
        const rtt=performance.now()-t0;
        heartbeats++;
        metricHB.textContent=heartbeats;
        hbDisplay.textContent='HB: '+heartbeats;
        rttSamples.push(rtt);
        if(rttSamples.length>20)rttSamples.shift();
        const avg=rttSamples.reduce(function(a,b){return a+b},0)/rttSamples.length;
        metricRT.textContent=avg.toFixed(0);
        addTimelineBar(rtt);
        statusDot.style.background='#22c55e';
        statusDot.style.boxShadow='0 0 6px #22c55e80';
        footerStatus.textContent='Connected — HB #'+heartbeats;
      });
    }catch(e){
      statusDot.style.background='#f87171';
      statusDot.style.boxShadow='0 0 6px #f8717180';
      footerStatus.textContent='Disconnected';
      addLog('Heartbeat failed: '+e.message,'err');
    }
  }

  function updateMemory(){
    if(performance.memory){
      var mb=(performance.memory.usedJSHeapSize/1048576).toFixed(1);
      metricMem.textContent=mb;
    }
  }

  document.getElementById('cmdSend').addEventListener('click',function(){
    var v=cmdInput.value.trim();if(v){sendCmd(v);cmdInput.value='';}
  });
  cmdInput.addEventListener('keydown',function(e){
    if(e.key==='Enter'){var v=cmdInput.value.trim();if(v){sendCmd(v);cmdInput.value='';}}
  });
  document.querySelectorAll('[data-cmd]').forEach(function(btn){
    btn.addEventListener('click',function(){sendCmd(btn.dataset.cmd);});
  });

  addLog('Logic Prover DevTools panel initialized','ok');
  setInterval(doHeartbeat,873);
  setInterval(updateMemory,2000);
  doHeartbeat();
  updateMemory();
})();
</script>
</body>
</html>
