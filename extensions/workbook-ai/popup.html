<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workbook AI</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 340px; min-height: 200px; max-height: 500px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1e1e2e; color: #cdd6f4; font-size: 13px;
  display: flex; flex-direction: column; overflow: hidden;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }

.popup-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; background: #252536; border-bottom: 1px solid #45475a;
}
.popup-header .logo { font-weight: 700; font-size: 14px; color: #89b4fa; }
.open-btn {
  background: #89b4fa; color: #1e1e2e; border: none; padding: 5px 14px;
  border-radius: 8px; font-weight: 600; font-size: 12px; cursor: pointer;
  transition: opacity 0.2s;
}
.open-btn:hover { opacity: 0.85; }

.section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; color: #7f849c; padding: 10px 14px 4px;
}

.quick-capture {
  padding: 8px 14px; display: flex; flex-direction: column; gap: 6px;
  border-bottom: 1px solid #45475a;
}
.quick-capture textarea {
  width: 100%; height: 60px; resize: none; background: #2a2a3d;
  border: 1px solid #45475a; border-radius: 8px; padding: 8px 10px;
  color: #cdd6f4; font-family: inherit; font-size: 12px; outline: none;
}
.quick-capture textarea:focus { border-color: #89b4fa; }
.quick-capture textarea::placeholder { color: #7f849c; }
.capture-actions {
  display: flex; align-items: center; justify-content: space-between;
}
.capture-actions select {
  background: #2a2a3d; border: 1px solid #45475a; border-radius: 6px;
  padding: 4px 8px; color: #cdd6f4; font-size: 11px; outline: none;
}
.save-capture-btn {
  background: #a6e3a1; color: #1e1e2e; border: none; padding: 4px 14px;
  border-radius: 6px; font-weight: 600; font-size: 11px; cursor: pointer;
  transition: opacity 0.2s;
}
.save-capture-btn:hover { opacity: 0.85; }
.save-capture-btn:disabled { opacity: 0.4; cursor: default; }

.recent-list {
  flex: 1; overflow-y: auto; padding: 4px 10px 10px;
}
.recent-item {
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  transition: background 0.2s; margin-bottom: 2px;
}
.recent-item:hover { background: #2a2a3d; }
.recent-item-title {
  font-weight: 600; font-size: 12px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.recent-item-meta {
  font-size: 10px; color: #7f849c; margin-top: 2px;
  display: flex; gap: 8px;
}
.recent-item-meta .badge {
  background: #313145; padding: 1px 6px; border-radius: 8px;
  color: #74c7ec; font-size: 9px;
}

.empty-msg {
  text-align: center; color: #7f849c; padding: 20px 14px;
  font-size: 12px;
}

.popup-footer {
  padding: 6px 14px 8px; text-align: center; font-size: 10px;
  color: #45475a; border-top: 1px solid #45475a;
}

.toast-popup {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: #89b4fa; color: #1e1e2e; padding: 5px 16px; border-radius: 16px;
  font-size: 11px; font-weight: 600; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; z-index: 100;
}
.toast-popup.show { opacity: 1; }
</style>
</head>
<body>

<div class="popup-header">
  <span class="logo">📓 Workbook AI</span>
  <button class="open-btn" id="openSidePanel">Open Workbook</button>
</div>

<div class="section-title">Quick Capture</div>
<div class="quick-capture">
  <textarea id="captureText" placeholder="Jot down a quick note…"></textarea>
  <div class="capture-actions">
    <select id="captureCategory"></select>
    <button class="save-capture-btn" id="saveCapture" disabled>Save Note</button>
  </div>
</div>

<div class="section-title">Recent Notes</div>
<div class="recent-list" id="recentList"></div>

<div class="popup-footer">Ctrl+N new · Ctrl+F search</div>
<div class="toast-popup" id="toastPopup"></div>

<script>
const captureText = document.getElementById('captureText');
const captureCat = document.getElementById('captureCategory');
const saveCapture = document.getElementById('saveCapture');
const recentList = document.getElementById('recentList');
const toastEl = document.getElementById('toastPopup');

let notes = [];
let categories = ['General', 'Work', 'Personal', 'Ideas', 'Code Snippets'];

// ── Init ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  chrome.storage.local.get(['notes', 'categories'], (result) => {
    notes = result.notes || [];
    if (result.categories && result.categories.length) categories = result.categories;
    populateCategories();
    renderRecent();
  });

  captureText.addEventListener('input', () => {
    saveCapture.disabled = !captureText.value.trim();
  });

  saveCapture.addEventListener('click', quickSave);

  captureText.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') {
      e.preventDefault();
      if (captureText.value.trim()) quickSave();
    }
  });

  document.getElementById('openSidePanel').addEventListener('click', () => {
    chrome.runtime.sendMessage({ type: 'open-side-panel' });
    window.close();
  });
});

function populateCategories() {
  captureCat.innerHTML = '';
  categories.forEach((cat) => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    captureCat.appendChild(opt);
  });
}

function renderRecent() {
  recentList.innerHTML = '';
  const recent = notes.slice(0, 5);

  if (recent.length === 0) {
    const msg = document.createElement('div');
    msg.className = 'empty-msg';
    msg.textContent = 'No notes yet. Create your first one!';
    recentList.appendChild(msg);
    return;
  }

  recent.forEach((note) => {
    const item = document.createElement('div');
    item.className = 'recent-item';

    const title = document.createElement('div');
    title.className = 'recent-item-title';
    title.textContent = note.title || 'Untitled';

    const meta = document.createElement('div');
    meta.className = 'recent-item-meta';

    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = note.category || 'General';

    const dateSpan = document.createElement('span');
    dateSpan.textContent = formatDate(note.modifiedAt);

    const wordSpan = document.createElement('span');
    wordSpan.textContent = (note.wordCount || 0) + ' words';

    meta.appendChild(badge);
    meta.appendChild(dateSpan);
    meta.appendChild(wordSpan);

    item.appendChild(title);
    item.appendChild(meta);

    item.addEventListener('click', () => {
      chrome.runtime.sendMessage({ type: 'open-side-panel' });
      window.close();
    });

    recentList.appendChild(item);
  });
}

function quickSave() {
  const text = captureText.value.trim();
  if (!text) return;

  const titleLine = text.split('\n')[0].trim();
  const note = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 9),
    title: titleLine.length > 60 ? titleLine.slice(0, 57) + '...' : titleLine,
    content: escapeHtml(text),
    category: captureCat.value,
    createdAt: new Date().toISOString(),
    modifiedAt: new Date().toISOString(),
    wordCount: text.trim().split(/\s+/).filter(Boolean).length
  };

  notes.unshift(note);
  chrome.storage.local.set({ notes }, () => {
    captureText.value = '';
    saveCapture.disabled = true;
    renderRecent();
    showToast('Note saved!');
    chrome.runtime.sendMessage({ type: 'note-added', note }).catch((e) => console.debug('notify failed:', e));
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'Just now';
  if (diffMin < 60) return diffMin + 'm ago';
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return diffHr + 'h ago';
  const diffDay = Math.floor(diffHr / 24);
  if (diffDay < 7) return diffDay + 'd ago';
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 1500);
}
</script>
</body>
</html>
