<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Clipboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 340px;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 13px;
  color: #e0e0e0;
  background: #1a1a2e;
  padding: 12px;
}
h2 { color: #4fc3f7; font-size: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.clip-item {
  background: #16213e;
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
  border: 1px solid transparent;
  transition: border-color 0.15s;
}
.clip-item:hover { border-color: #0f3460; }
.clip-preview {
  font-size: 12px; color: #a0a0b0; line-height: 1.4;
  word-break: break-word; max-height: 40px; overflow: hidden;
  margin-bottom: 4px; white-space: pre-wrap;
}
.clip-meta {
  font-size: 10px; color: #666; margin-bottom: 4px;
}
.badge {
  font-size: 9px; padding: 1px 5px; border-radius: 8px;
  background: #0f3460; color: #4fc3f7; font-weight: 600;
  text-transform: uppercase; margin-right: 4px;
}
.btn {
  padding: 4px 10px; border-radius: 6px; border: none;
  font-size: 11px; cursor: pointer; color: #a0a0b0;
  background: #0f3460; font-family: inherit;
}
.btn:hover { background: #4fc3f7; color: #1a1a2e; }
.capture-area {
  width: 100%; margin-top: 10px;
}
.capture-area textarea {
  width: 100%; height: 60px; padding: 8px;
  border-radius: 8px; border: 1px solid #0f3460;
  background: #16213e; color: #e0e0e0;
  font-family: inherit; font-size: 12px;
  resize: none; outline: none;
}
.capture-area textarea:focus { border-color: #4fc3f7; }
.capture-btn {
  width: 100%; padding: 8px; border-radius: 8px; border: none;
  background: #4fc3f7; color: #1a1a2e; font-weight: 700;
  font-size: 13px; cursor: pointer; margin-top: 6px;
  font-family: inherit;
}
.capture-btn:hover { background: #29b6f6; }
.open-mgr {
  width: 100%; padding: 8px; border-radius: 8px; border: none;
  background: #0f3460; color: #e0e0e0; font-size: 12px;
  cursor: pointer; margin-top: 8px; font-family: inherit;
}
.open-mgr:hover { background: #4fc3f7; color: #1a1a2e; }
.empty { text-align: center; color: #666; padding: 16px 0; font-size: 12px; }
</style>
</head>
<body>

<h2>📋 Secure Clipboard</h2>

<div id="recent-clips"></div>

<div class="capture-area">
  <textarea id="capture-text" placeholder="Type or paste text to save..."></textarea>
  <button class="capture-btn" id="btn-capture">💾 Save to Clipboard</button>
</div>

<button class="open-mgr" id="btn-open-manager">Open Full Manager ▸</button>

<script>
'use strict';

function escapeHtml(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function relativeTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return new Date(ts).toLocaleDateString();
}

function renderRecent() {
  chrome.runtime.sendMessage({ type: 'GET_HISTORY' }, (res) => {
    const history = (res?.history || []).slice(0, 5);
    const container = document.getElementById('recent-clips');

    if (history.length === 0) {
      container.innerHTML = '<div class="empty">No clips yet. Copy something!</div>';
      return;
    }

    let html = '';
    for (const item of history) {
      const preview = escapeHtml(item.text.substring(0, 80));
      html += `
        <div class="clip-item">
          <div class="clip-meta">
            <span class="badge">${escapeHtml(item.category)}</span>
            ${escapeHtml(relativeTime(item.timestamp))}
          </div>
          <div class="clip-preview">${preview}${item.text.length > 80 ? '…' : ''}</div>
          <button class="btn" data-text="${escapeHtml(item.text)}">📋 Copy</button>
        </div>`;
    }
    container.innerHTML = html;

    container.querySelectorAll('.btn[data-text]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(btn.dataset.text);
          btn.textContent = '✓ Copied';
          setTimeout(() => { btn.textContent = '📋 Copy'; }, 1200);
        } catch {
          btn.textContent = '✕ Failed';
        }
      });
    });
  });
}

document.getElementById('btn-capture').addEventListener('click', () => {
  const textarea = document.getElementById('capture-text');
  const text = textarea.value.trim();
  if (!text) return;
  chrome.runtime.sendMessage(
    { type: 'COPY_EVENT', text: text, url: 'manual-capture' },
    (response) => {
      if (response?.ok) {
        textarea.value = '';
        renderRecent();
      }
    }
  );
});

document.getElementById('btn-open-manager').addEventListener('click', async () => {
  const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
  if (tab) {
    try {
      await chrome.sidePanel.open({ tabId: tab.id });
    } catch {
      await chrome.sidePanel.open({ windowId: tab.windowId });
    }
  }
  window.close();
});

renderRecent();
</script>
</body>
</html>
