name: Build Extensions

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'build-extensions.sh'
  pull_request:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'build-extensions.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package extensions
        run: bash build-extensions.sh

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-extensions
          path: dist/extensions/*.zip
          retention-days: 90

      - name: Verify artifacts
        run: |
          echo "Built extension packages:"
          ls -lh dist/extensions/*.zip
          echo ""
          TOTAL=$(ls dist/extensions/*.zip | wc -l)
          echo "Total packages: ${TOTAL}"
          if [ "${TOTAL}" -lt 25 ]; then
            echo "WARNING: Expected 25 extensions, got ${TOTAL}"
            exit 1
          fi
