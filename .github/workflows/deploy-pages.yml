# ============================================================================
# Deploy to GitHub Pages — Autonomous Production Hosting
#
# Deploys the download page, download worker, and all extension source files
# to GitHub Pages. The download page becomes a live, permanent, self-hosted
# download portal at: https://freddycreates.github.io/potential-succotash/
#
# Runs on every push to main. Fully autonomous — 24/7 from second one.
# ============================================================================

name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
