# ============================================================================
# Deploy Sonic Ninja Lab to GitHub Pages — Autonomous Production Hosting
#
# Deploys the Sonic Ninja Lab pages, download worker, and all extension source files
# to GitHub Pages. The download page becomes a live, permanent, self-hosted
# download portal at: https://freddycreates.github.io/potential-succotash/
#
# Runs on every push to main. Fully autonomous — 24/7 from second one.
# ============================================================================

name: Deploy Sonic Ninja Lab Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Sonic Ninja Lab to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: setup-pages
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Check Pages availability
        if: steps.setup-pages.outcome == 'failure'
        run: |
          echo "⚠️ GitHub Pages is not enabled for this repository."
          echo "   Enable it in Settings → Pages → Source: GitHub Actions"
          echo "   Skipping deployment."
          exit 0

      - name: Upload artifact
        if: steps.setup-pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Sonic Ninja Lab to GitHub Pages
        if: steps.setup-pages.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v4
