name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        # Firewall: allow outbound HTTPS to GitHub and package registries
        firewall:
            allowed-domains:
                - github.com
                - api.github.com
                - objects.githubusercontent.com
                - uploads.github.com
                - user-images.githubusercontent.com
                - registry.npmjs.org
                - npmjs.org
                - pypi.org
                - files.pythonhosted.org

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Expose GitHub token
              run: |
                  echo "GH_TOKEN=${GITHUB_TOKEN}" >> "$GITHUB_ENV"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install and authenticate gh CLI
              run: |
                  # gh is preinstalled on ubuntu-latest runners, verify it exists
                  gh --version
                  # Authenticate using the token
                  echo "${GH_TOKEN}" | gh auth login --with-token
                  gh auth status
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci
