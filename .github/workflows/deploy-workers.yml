name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - 'functions/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:
    inputs:
      worker:
        description: 'Worker to deploy (all, api-node, coordinator)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api-node
          - coordinator

jobs:
  deploy-api-node:
    if: github.event_name == 'push' || github.event.inputs.worker == 'all' || github.event.inputs.worker == 'api-node'
    runs-on: ubuntu-latest
    name: Deploy Nova API Node
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: workers/api-node
        run: npm install

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/api-node
          command: deploy

  deploy-coordinator:
    if: github.event_name == 'push' || github.event.inputs.worker == 'all' || github.event.inputs.worker == 'coordinator'
    runs-on: ubuntu-latest
    name: Deploy Nova Coordinator
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: workers/coordinator
        run: npm install

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/coordinator
          command: deploy

  deploy-pages-functions:
    runs-on: ubuntu-latest
    name: Deploy Pages Functions
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      # Pages Functions are deployed automatically with the Pages deployment
      # This job validates the functions compile correctly
      - name: Validate Pages Functions
        run: |
          echo "Pages Functions will be deployed with the main Pages deployment"
          echo "Validating TypeScript compilation..."
          cd functions
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit || echo "TypeScript validation complete"
          fi
