# ============================================================================
# 📸 organism-visual-bot — Visual Regression & Screenshot Testing
#
# Runs visual regression checks across the organism's HTML surfaces:
#   - Crawls all HTML entry points (download.html, webapp, extension popups)
#   - Captures screenshots using Puppeteer (headless Chromium)
#   - Diffs against baseline screenshots in docs/visual-baselines/
#   - Flags regressions above a pixel-diff threshold
#   - Generates docs/visual-report.md with pass/fail per page
#
# Bot identity: organism-visual-bot
# Triggers: Nightly (02:00 UTC) + push to HTML/CSS surfaces
# ============================================================================

name: 📸 organism-visual-bot

on:
  schedule:
    - cron: '0 2 * * *'   # Nightly 02:00 UTC
  push:
    branches: [main]
    paths:
      - '*.html'
      - 'dist/webapp/**'
      - 'extensions/jarvis/src/**/*.tsx'
      - 'extensions/jarvis/src/**/*.css'
      - '.github/workflows/organism-visual-bot.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  visual-regression:
    name: 📸 Visual Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgbm1 libasound2 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libpango-1.0-0 \
            libpangocairo-1.0-0 2>/dev/null || true

      - name: Install npm dependencies
        run: npm install --save-dev puppeteer 2>/dev/null || npm install puppeteer --no-save 2>/dev/null || echo "Puppeteer install attempted"

      - name: Scan HTML surfaces
        run: node scripts/visual-bot/scan-html-surfaces.js

      - name: Capture screenshots
        run: node scripts/visual-bot/capture-screenshots.js

      - name: Compare with baselines
        run: node scripts/visual-bot/compare-baselines.js

      - name: Generate visual report
        run: node scripts/visual-bot/generate-visual-report.js

      - name: Commit visual report
        run: |
          git config user.name "organism-visual-bot"
          git config user.email "organism-visual-bot@users.noreply.github.com"
          git add docs/visual-report.md docs/visual-baselines/
          if git diff --cached --quiet; then
            echo "Visual report unchanged"
          else
            git commit -m "📸 organism-visual-bot: update visual regression report [skip ci]"
            git push
          fi
