# ============================================================================
# 🚀 organism-release-bot — Production Release Builder
#
# Triggered on version tags (v*). Builds everything, generates a changelog,
# and creates a GitHub Release with all artifacts:
#   - All extension zips
#   - SDK tarballs
#   - Sovereign organism bundle (tar.gz + zip)
#   - Release manifest (JSON)
#   - Changelog (auto-generated from commit history)
#
# Bot identity: organism-release-bot
# Triggers on: version tags (v*)
# ============================================================================

name: 🚀 organism-release-bot

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v20.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ── Phase 1: Pre-flight checks ─────────────────────────────────────────────
  preflight:
    name: 🚀 Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve tag and version
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "🚀 Releasing: ${TAG} (version ${VERSION})"

      - name: Run tests
        run: |
          node scripts/lint-manifests.js
          node --test test/**/*.test.js

  # ── Phase 2: Build all artifacts ──────────────────────────────────────────
  build-artifacts:
    name: 🚀 Build All Artifacts
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extensions/jarvis/package-lock.json

      - name: Install Vigil AI dependencies
        working-directory: extensions/jarvis
        run: npm ci

      - name: Build Vigil AI
        working-directory: extensions/jarvis
        run: npm run build

      - name: Generate icons
        run: node scripts/generate-icons.js

      - name: Package all extensions
        run: |
          set -euo pipefail
          mkdir -p dist/extensions
          TAG="${{ needs.preflight.outputs.tag }}"
          VERSION="${{ needs.preflight.outputs.version }}"

          echo "══════════════════════════════════════════════════════════"
          echo "  🚀 organism-release-bot: Packaging Extensions for ${TAG}"
          echo "══════════════════════════════════════════════════════════"

          # Vigil AI
          cd extensions/jarvis/dist
          zip -r "../../../dist/extensions/vigil-ai-v${VERSION}.zip" . -x "*.DS_Store"
          echo "  ✓ vigil-ai-v${VERSION}.zip"
          cd - > /dev/null

          # Simple extensions
          for ext_path in extensions/*/; do
            ext_name="$(basename "${ext_path}")"
            [ "${ext_name}" = "windows" ] && continue
            [ "${ext_name}" = "jarvis" ] && continue
            [ ! -f "${ext_path}/manifest.json" ] && continue
            [ -f "${ext_path}/package.json" ] && continue
            (cd "${ext_path}" && zip -r -q \
              "../../dist/extensions/${ext_name}.zip" \
              manifest.json \
              $(ls background.js content.js icons/ 2>/dev/null || true) \
              2>/dev/null || true)
            [ -f "dist/extensions/${ext_name}.zip" ] && echo "  ✓ ${ext_name}.zip"
          done

          # All-extensions bundle
          cd dist/extensions
          zip all-extensions.zip *.zip
          cd - > /dev/null
          echo "  ✓ all-extensions.zip"

      - name: Build sovereign organism bundle
        run: node scripts/bundle-release.js

      - name: Generate release manifest
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          VERSION="${{ needs.preflight.outputs.version }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT="${GITHUB_SHA}"

          EXT_COUNT=$(ls dist/extensions/*.zip 2>/dev/null | wc -l)
          BUNDLE_SIZE=$(du -sh dist/extensions/all-extensions.zip 2>/dev/null | cut -f1 || echo "—")

          cat > dist/release-manifest-${TAG}.json << EOF
          {
            "release": "${TAG}",
            "version": "${VERSION}",
            "timestamp": "${TIMESTAMP}",
            "commit": "${COMMIT}",
            "bot": "organism-release-bot",
            "artifacts": {
              "extensions": ${EXT_COUNT},
              "all_extensions_bundle": "all-extensions.zip",
              "bundle_size": "${BUNDLE_SIZE}"
            },
            "run_id": "${GITHUB_RUN_ID}",
            "run_url": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF
          echo "✅ Release manifest: dist/release-manifest-${TAG}.json"

      - name: Upload all release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ needs.preflight.outputs.tag }}
          path: |
            dist/extensions/*.zip
            dist/sovereign-organism-*.tar.gz
            dist/sovereign-organism-*.zip
            dist/release-manifest-*.json
          retention-days: 90

  # ── Phase 3: Create GitHub Release ────────────────────────────────────────
  create-release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [preflight, build-artifacts]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-${{ needs.preflight.outputs.tag }}
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          VERSION="${{ needs.preflight.outputs.version }}"

          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          echo "## 🚀 Organism Release ${TAG}" > /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "**Release Bot:** organism-release-bot 🚀" >> /tmp/changelog.md
          echo "**Timestamp:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md

          if [ -n "${PREV_TAG}" ]; then
            echo "### Changes since ${PREV_TAG}" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges | head -50 >> /tmp/changelog.md
          else
            echo "### Initial Release" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            git log --pretty=format:"- %s (%h)" --no-merges | head -30 >> /tmp/changelog.md
          fi

          echo "" >> /tmp/changelog.md
          echo "### Artifacts" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "| Artifact | Description |" >> /tmp/changelog.md
          echo "|---|---|" >> /tmp/changelog.md
          echo "| \`vigil-ai-v${VERSION}.zip\` | Vigil AI browser extension (Chrome/Edge) |" >> /tmp/changelog.md
          echo "| \`all-extensions.zip\` | Complete extension library (all 36 extensions) |" >> /tmp/changelog.md
          echo "| \`sovereign-organism-*.tar.gz\` | Sovereign organism bundle (tar.gz) |" >> /tmp/changelog.md
          echo "| \`sovereign-organism-*.zip\` | Sovereign organism bundle (zip) |" >> /tmp/changelog.md

          cat /tmp/changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: "🚀 Organism ${{ needs.preflight.outputs.tag }}"
          body_path: /tmp/changelog.md
          files: |
            dist/extensions/*.zip
            dist/sovereign-organism-*.tar.gz
            dist/sovereign-organism-*.zip
            dist/release-manifest-*.json
          draft: false
          prerelease: ${{ contains(needs.preflight.outputs.tag, '-alpha') || contains(needs.preflight.outputs.tag, '-beta') || contains(needs.preflight.outputs.tag, '-rc') }}
          make_latest: true
